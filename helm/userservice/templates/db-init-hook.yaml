apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "userservice.fullname" . }}-db-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "userservice.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 120
  template:
    metadata:
      labels:
        {{- include "userservice.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db-init
    spec:
      restartPolicy: Never
      containers:
        - name: db-init
          image: mysql:8.0
          securityContext:
            runAsUser: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              export MYSQL_PWD="$MASTER_PASSWORD"
              printf 'CREATE DATABASE IF NOT EXISTS userservice;\nCREATE USER IF NOT EXISTS '\''userservice_user'\''@'\''%%'\'' IDENTIFIED BY '\''%s'\'';\nALTER USER '\''userservice_user'\''@'\''%%'\'' IDENTIFIED BY '\''%s'\'';\nGRANT SELECT, INSERT, UPDATE, DELETE, CREATE, ALTER, INDEX, DROP, REFERENCES ON userservice.* TO '\''userservice_user'\''@'\''%%'\'';\nFLUSH PRIVILEGES;\n' \
                "$SERVICE_DB_PASSWORD" \
                "$SERVICE_DB_PASSWORD" \
              | mysql -h "$RDS_HOST" -P "$RDS_PORT" -u "$MASTER_USERNAME"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: RDS_HOST
              valueFrom:
                configMapKeyRef:
                  name: db-init-config
                  key: RDS_HOST
            - name: RDS_PORT
              valueFrom:
                configMapKeyRef:
                  name: db-init-config
                  key: RDS_PORT
            - name: MASTER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-init-master-secret
                  key: username
            - name: MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-init-master-secret
                  key: password
            - name: SERVICE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-init-service-secrets
                  key: userservice_password
      volumes:
        - name: tmp
          emptyDir: {}
