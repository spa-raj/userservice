apiVersion: v1
kind: Service
metadata:
  name: userservice
  namespace: vibevault
  labels:
    app: userservice
    part-of: vibevault
spec:
  type: ClusterIP
  selector:
    app: userservice
  ports:
    - name: http
      port: 80
      targetPort: 8081
      protocol: TCP
    - name: issuer
      port: 8081
      targetPort: 8081
      protocol: TCP
